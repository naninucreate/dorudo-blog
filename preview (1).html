<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Blog Data</title>
</head>
<body>

<script>

/*
================================================
このファイルは「ブログ記事データ」専用
ここを編集して記事を追加する
================================================


■ 基本ルール

・記事は { } で囲む
・記事の区切りは , (カンマ)
・最後の記事の後ろのカンマは消してもOK


================================================
項目説明
================================================

title
記事タイトルを書く

date
日付を書く
例
2026-03-10
2026/03/10
自由でもOK

public
公開設定

true  → 本命サイトに表示される
false → 非公開（下書き）

content
記事本文を書く

memo
自分用メモ
サイトには表示されない


================================================
改行のやり方
================================================

普通に改行するとエラーになる場合があるので
改行したい場所に

\n

を書く


例

content: "今日はいい天気。\n公園に行った。"


表示

今日はいい天気。
公園に行った。


================================================
長い文章を書くコツ
================================================

文章が長い場合は

\n\n

で段落分けできる


例

content: "今日は学校。\n\n友達と遊んだ。\n\n楽しかった"


================================================
「 」や : や , を文章で使う場合
================================================

基本そのまま書いてOK


例

content: "先生が「宿題出した？」って聞いてきた"


================================================
記事追加方法
================================================

1. 一番下のテンプレをコピー
2. 下に貼る
3. タイトルと本文を書く


================================================
公開 / 非公開
================================================

公開する場合

public: true


下書き（非公開）

public: false


================================================
メモ
================================================

memo は自分用

例

memo: "後で写真追加"


================================================
記事データ
================================================
*/


const posts = [

{
title: "最初の記事",
date: "2026-03-10",
public: true,
content: "ここに記事を書く。\n改行もできる。",
memo: "テスト記事"
},

{
title: "まだ公開しない記事",
date: "2026-03-09",
public: false,
content: "これは非公開の記事。",
memo: "完成したら公開"
},

{
title: "長文記事テスト",
date: "2026-03-08",
public: true,
content: "今日は学校。\n\n友達と遊んだ。\n\n楽しかった。",
memo: ""
}


/*
================================================
記事追加テンプレ
これをコピーして使う
================================================

{
title: "タイトル",
date: "2026-00-00",
public: true,
content: "本文を書く。\n改行は \\n を使う。",
memo: ""
},

*/


];

</script>

</body>
</html>
