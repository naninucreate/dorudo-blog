<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dorudo Blog</title>

<style>
body{
margin:0;
padding:30px;
background:#111;
color:#e0e0e0;
font-family:'Noto Sans JP',sans-serif;
}

h1{
color:#4a90e2;
margin-bottom:30px;
}

article{
background:#1a1d21;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.date{
color:#8aaae5;
font-size:0.85rem;
margin-bottom:5px;
}

</style>
</head>

<body>

<h1>Dorudo Blog</h1>

<script>

/*

====================================
Dorudo Blog 記事データ
====================================

ここに記事を書いていく

------------------------------------
記事の追加方法
------------------------------------

一番下のテンプレをコピーして
posts の中に追加する


------------------------------------
項目説明
------------------------------------

title
記事タイトル

date
日付
例
2026/03/10

public
公開設定

true  → 公開
false → 非公開（下書き）

content
本文

memo
自分用メモ
サイトには表示されない


------------------------------------
改行のやり方
------------------------------------

文章の中で

\n

を書くと改行される


例

content:"今日は学校。\n友達と遊んだ"


------------------------------------
段落改行
------------------------------------

\n\n


------------------------------------
記事テンプレ
------------------------------------

{
title:"タイトル",
date:"2026/00/00",
public:true,
content:"本文\n改行できる",
memo:"メモ"
},

*/


const posts=[

{
title:"ブログ開始",
date:"2026/03/10",
public:true,
content:"Dorudo Blog を開始しました。\n\nこれからアップデート情報などを書いていきます。",
memo:"最初の記事"
},

{
title:"よろしくです",
date:"2026/03/09",
public:true,
content:"なにぬです。ブログの運用を開始いたします。",
memo:"こんな感じで書く"
}

{
title:"タイトル",
date:"2026/00/00",
public:true,
content:"本文\n改行できる",
memo:"メモ"
},


{
title:"タイトル",
date:"2026/00/00",
public:true,
content:"本文\n改行できる",
memo:"メモ"
},


{
title:"タイトル",
date:"2026/00/00",
public:true,
content:"本文\n改行できる",
memo:"メモ"
},


];



/* =========================
記事表示処理
========================= */

posts
.filter(p=>p.public)
.sort((a,b)=> new Date(b.date)-new Date(a.date))
.forEach(post=>{

const article=document.createElement("article");

article.innerHTML=`
<div class="date">${post.date}</div>
<h2>${post.title}</h2>
<p>${post.content.replace(/\n/g,"<br>")}</p>
`;

document.body.appendChild(article);

});

</script>

</body>
</html>
