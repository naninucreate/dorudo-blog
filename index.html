■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
基本ルール
■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■

記事はこの形で書く

{
title:"タイトル",
date:"2026/03/10",
public:true,
content:"本文",
memo:"メモ"
},


■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
項目の説明
■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■


title
記事タイトル

例
title:"アップデート情報"



date
日付

例
date:"2026/03/10"



public
公開設定

true  = 公開
false = 非公開（下書き）


例

public:true
公開

public:false
非公開



content
記事本文



memo
自分用メモ

※サイトには表示されない



■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
改行の方法
■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■


1行改行

\n


例

content:"今日は学校。\n友達と遊んだ"



2行改行

\n\n



■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
よくあるミス
■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■


記事の最後には

カンマ , を付ける


例

},
{

※最後の記事だけはカンマ無し


■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
記事を書く場所
↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓
*/


const posts=[

/*

==================================================
ここから下はブログ表示プログラム
基本触らない
==================================================

*/


posts

/* 公開記事だけ表示 */

.filter(post=>post.public)

/* 新しい順に並べる */

.sort((a,b)=> new Date(b.date)-new Date(a.date))

/* HTML作成 */

.forEach(post=>{

const article=document.createElement("article");

article.innerHTML=`
<div class="date">${post.date}</div>
<h2>${post.title}</h2>
<p>${post.content.replace(/\n/g,"<br>")}</p>
`;

document.body.appendChild(article);

});
